<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Art Puzzle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --purple: #7c5cbf;
    --purple-light: #a88fe0;
    --purple-dark: #5a3e99;
    --cream: #fdf8ee;
    --gold: #f0c040;
    --bg: #f0eefa;
    --shadow: rgba(124,92,191,0.18);
  }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  .phone {
    width: 375px;
    min-height: 100vh;
    background: #fff;
    overflow: hidden;
    padding-bottom: 20px;
  }

  .top-bar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 16px 20px 8px;
  }
  .score-badge {
    background: var(--gold);
    border-radius: 50px;
    padding: 6px 14px 6px 10px;
    display: flex; align-items: center; gap: 6px;
    border: 3px solid #d4a020;
    box-shadow: 0 3px 0 #b8891a;
  }
  .score-badge .icon { font-size: 22px; }
  .score-badge .num  { font-size: 17px; font-weight: 900; color: #4a2c00; }

  .instruction {
    padding: 12px 20px 14px;
    font-size: 20px;
    font-weight: 800;
    color: var(--purple);
    line-height: 1.3;
  }

  .puzzle-wrap { padding: 0 18px; position: relative; }

  .puzzle-grid {
    display: grid;
    grid-template-columns: repeat(3, 113px);
    gap: 3px;
    width: 345px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 20px var(--shadow);
    position: relative;
  }

  .tile {
    width: 113px;
    height: 95px;
    background-repeat: no-repeat;
    cursor: pointer;
    user-select: none;
    transition: transform 0.12s ease;
    position: relative;
  }

  .tile.selected {
    outline: 4px solid var(--purple);
    outline-offset: -4px;
    z-index: 2;
    transform: scale(1.04);
    filter: brightness(1.15);
  }

  @keyframes correctFlash {
    0%, 100% { filter: brightness(1); }
    50%       { filter: brightness(1.5) saturate(1.6); }
  }
  @keyframes wrongFlash {
    0%, 100% { filter: brightness(1); }
    25%       { filter: brightness(0.45) saturate(0); }
    75%       { filter: brightness(0.65) saturate(0); }
  }
  @keyframes heartBreak {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.4) rotate(-12deg); }
    60%  { transform: scale(0.6) rotate(6deg); }
    100% { transform: scale(0.7); opacity: 0.15; }
  }

  .tile.correct-flash { animation: correctFlash 0.5s ease; }
  .tile.wrong-flash   { animation: wrongFlash   0.5s ease; }

    position: absolute;
    inset: 0;
    border-radius: 12px;
    z-index: 10;
    opacity: 0;
    pointer-events: none;

  .hint-overlay.visible { opacity: 1; pointer-events: all; }

  .swap-hint {
    position: absolute;
    bottom: -26px;
    left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--purple-light);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .swap-hint.visible { opacity: 1; }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 10px;
  }
  .hearts { display: flex; gap: 4px; align-items: center; }

  .heart-img {
    width: 36px;
    height: 36px;
    object-fit: contain;
    transition: transform 0.3s, opacity 0.4s;
    image-rendering: pixelated;
    background: transparent;
  }
  .heart-img.lost     { opacity: 0.15; transform: scale(0.65); }
  .heart-img.breaking { animation: heartBreak 0.5s ease forwards; }

  .hint-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: block;
    transition: transform 0.1s, filter 0.1s;
  }
  .hint-btn img {
    height: 46px;
    display: block;
    image-rendering: auto;
  }
  .hint-btn:active { transform: translateY(2px) scale(0.97); filter: brightness(0.92); }

  .dog-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 24px;
    gap: 6px;
  }
  .speech-bubble {
    background: #f8f4ff;
    border: 2px solid #d0c8e8;
    border-radius: 16px 16px 16px 4px;
    padding: 7px 16px;
    font-size: 14px;
    font-weight: 700;
    color: var(--purple);
    max-width: 220px;
    text-align: center;
    min-height: 36px;
    display: flex; align-items: center; justify-content: center;
  }
  .dog-sprite {
    width: 80px;
    height: 80px;
    object-fit: contain;
    image-rendering: pixelated;
  }

  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .overlay.active { opacity: 1; pointer-events: all; }
  .overlay-lose { background: rgba(90,62,153,0.87); backdrop-filter: blur(6px); }
  .overlay-win  { background: rgba(124,92,191,0.92); backdrop-filter: blur(8px); }

  .overlay-card {
    background: #fff;
    border-radius: 28px;
    padding: 36px 32px;
    text-align: center;
    width: 300px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    transform: scale(0.8);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .overlay.active .overlay-card { transform: scale(1); }

  .overlay-title { font-size: 28px; font-weight: 900; margin-bottom: 6px; }
  .overlay-sub   { font-size: 15px; color: #888; margin-bottom: 24px; line-height: 1.5; }

  .replay-btn {
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 30px;
    padding: 13px 36px;
    font-family: 'Nunito', sans-serif;

  var COLS = 3, ROWS = 3;
  var TW   = 113, TH = 95, GAP = 3;
  var BGW  = TW * COLS + GAP * (COLS - 1);
  var BGH  = TH * ROWS + GAP * (ROWS - 1);

  var tiles = [], selected = -1, hearts = 3;
  var busy = false, gameOver = false, hintTimer = null;

  var msgs = {
    idle:    ["Hmm..", "Think carefully!", "I believe in you!", "Almost there?"],
    correct: ["Yes! Great move!", "Woof! Correct!", "Nice swap!", "Nailed it!"],
    wrong:   ["Oops! Not quite.", "Try again!", "Nope, wrong spot.", "Hmm, not there."],
    select:  ["Pick another!", "Now swap it!", "Good choice!"],
    hint:    ["Here is a peek!", "Memorize it!", "Look closely!"],
    win:     ["We did it!", "Masterpiece!"],
    lose:    ["Oh no! Hearts gone!", "Better luck next time!"]
  };

  function rand(key) {
    var arr = msgs[key];
    return arr[Math.floor(Math.random() * arr.length)];
  }
  function setSpeech(text) { document.getElementById("bubble").textContent = text; }

  function isSolved(arr) {
    for (var i = 0; i < arr.length; i++) { if (arr[i] !== i) return false; }
    return true;
  }
  function isSolvable(arr) {
    var inv = 0;
    for (var i = 0; i < arr.length - 1; i++)
      for (var j = i + 1; j < arr.length; j++)
        if (arr[i] > arr[j]) inv++;
    return inv % 2 === 0;
  }
  function shuffleTiles() {
    var arr = [0,1,2,3,4,5,6,7,8], attempts = 0, tmp, i, j;
    do {
      for (i = arr.length - 1; i > 0; i--) {
        j = Math.floor(Math.random() * (i + 1));
        tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
      }
      attempts++;
    } while ((isSolved(arr) || !isSolvable(arr)) && attempts < 1000);
    return arr;
  }

  function buildStyle(idx) {
    var row = Math.floor(idx / COLS), col = idx % COLS;
    var bx = -(col * (TW + GAP)), by = -(row * (TH + GAP));
    return "background-image:url(" + IMG + ");background-size:" + BGW + "px " + BGH + "px;background-position:" + bx + "px " + by + "px;";
  }

  function renderGrid() {
    var grid = document.getElementById("grid");
    grid.innerHTML = "";
    for (var pos = 0; pos < tiles.length; pos++) {
      var div = document.createElement("div");
      div.className = "tile";
      div.id = "t" + pos;
      div.setAttribute("style", buildStyle(tiles[pos]));
      div.addEventListener("click", makeTileHandler(pos));
      grid.appendChild(div);
    }
  }
  function makeTileHandler(pos) { return function () { onTileClick(pos); }; }

  function onTileClick(pos) {
    if (gameOver || busy) return;
    if (selected === -1) {
      selected = pos;
      document.getElementById("t" + pos).classList.add("selected");
      document.getElementById("swapHint").classList.add("visible");
      setSpeech(rand("select"));
    } else if (selected === pos) {
      document.getElementById("t" + pos).classList.remove("selected");
      selected = -1;
      document.getElementById("swapHint").classList.remove("visible");
      setSpeech(rand("idle"));
    } else {
      var a = selected; selected = -1;
      document.getElementById("swapHint").classList.remove("visible");
      doSwap(a, pos);
    }
  }

  function doSwap(posA, posB) {
    busy = true;
    var tA = tiles[posA], tB = tiles[posB];
    var aOk = (tB === posA), bOk = (tA === posB);
    tiles[posA] = tB; tiles[posB] = tA;
    renderGrid();
    var elA = document.getElementById("t" + posA);
    var elB = document.getElementById("t" + posB);
    if (aOk || bOk) {
      if (aOk) elA.classList.add("correct-flash");
      if (bOk) elB.classList.add("correct-flash");
      setSpeech(rand("correct"));
    } else {
      elA.classList.add("wrong-flash");
      elB.classList.add("wrong-flash");
      setSpeech(rand("wrong"));
      loseHeart();
    }
    setTimeout(function () {
      if (elA) { elA.classList.remove("correct-flash"); elA.classList.remove("wrong-flash"); }
      if (elB) { elB.classList.remove("correct-flash"); elB.classList.remove("wrong-flash"); }
      busy = false;
      if (isSolved(tiles)) { showWin(); }
    }, 520);
  }

  function loseHeart() {
    if (hearts <= 0) return;
    hearts--;
    var el = document.getElementById("h" + hearts);
    el.classList.add("breaking");
    setTimeout(function () {
      el.classList.remove("breaking");
      el.classList.add("lost");
      if (hearts === 0) { showGameOver(); }
    }, 520);
  }

  function showGameOver() {
    gameOver = true;
    setSpeech(rand("lose"));
    document.getElementById("loseScreen").classList.add("active");
  }
  function showWin() {
    gameOver = true;
    setSpeech(rand("win"));
    document.getElementById("winScreen").classList.add("active");
    document.getElementById("score").textContent = "396";
  }
  function resetGame() {
    gameOver = false; busy = false; hearts = 3; selected = -1;
    tiles = shuffleTiles();
    for (var i = 0; i < 3; i++) {
      var el = document.getElementById("h" + i);
      el.classList.remove("lost", "breaking");
    }
    document.getElementById("swapHint").classList.remove("visible");
    document.getElementById("score").textContent = "346";
    document.getElementById("loseScreen").classList.remove("active");
    document.getElementById("winScreen").classList.remove("active");
    setSpeech(rand("idle"));
    renderGrid();
  }

  document.getElementById("hintBtn").addEventListener("click", function () {
    if (gameOver || hintTimer !== null) return;
    setSpeech(rand("hint"));
    var overlay = document.getElementById("hintOverlay");
    overlay.classList.add("visible");
    hintTimer = setTimeout(function () {
      overlay.classList.remove("visible");
      hintTimer = null;
    }, 2000);
  });

  document.getElementById("replayBtn").addEventListener("click", resetGame);
  document.getElementById("playAgainBtn").addEventListener("click", resetGame);

  tiles = shuffleTiles();
  renderGrid();
}());
</script>
