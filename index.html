<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="layout">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="profile-section">
        <div class="profile-avatar-wrap">
          <img class="profile-avatar" id="profileImg" src="" alt="Profile photo" />
        </div>
        <h1 class="profile-name" id="profileName"></h1>
        <p class="profile-desc" id="profileDesc"></p>
      </div>

      <div class="links-section" id="linksSection"></div>
      <p class="side-remark">Created with ❤️ and AI 🤖</p>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="mainContent"></main>

  </div>

  <script src="app.js"></script>
</body>
</html>
